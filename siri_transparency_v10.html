
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
.phone {
  width: 340px; height: 720px;
  background: #000; border-radius: 44px; border: 1px solid #222;
  position: relative; overflow: hidden;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  display: flex; flex-direction: column; margin: 0 auto;
}

/* Glowing border hue — matches Figma: purple left, orange right, wrapping the bottom edge */
.glow-border {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  border-radius: 44px;
  background: transparent;
  box-shadow: none;
  transition: opacity 0.6s ease;
  opacity: 0;
}
.glow-border.active {
  opacity: 1;
}

/* The actual colored glow that wraps the bottom border */
.glow-base {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 100%; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 55% 30% at 10% 100%, rgba(140,40,255,0.75) 0%, transparent 65%),
    radial-gradient(ellipse 55% 30% at 90% 100%, rgba(230,90,20,0.75) 0%, transparent 65%),
    radial-gradient(ellipse 40% 15% at 50% 100%, rgba(180,60,240,0.3) 0%, transparent 60%);
  transition: opacity 0.8s ease;
}
.glow-base.dim {
  background:
    radial-gradient(ellipse 45% 20% at 10% 100%, rgba(140,40,255,0.45) 0%, transparent 65%),
    radial-gradient(ellipse 45% 20% at 90% 100%, rgba(230,90,20,0.45) 0%, transparent 65%);
}
.glow-base.bright {
  background:
    radial-gradient(ellipse 65% 38% at 8% 100%, rgba(140,40,255,0.9) 0%, transparent 60%),
    radial-gradient(ellipse 65% 38% at 92% 100%, rgba(230,90,20,0.9) 0%, transparent 60%),
    radial-gradient(ellipse 50% 20% at 50% 100%, rgba(180,60,240,0.4) 0%, transparent 55%);
}

/* Glowing bottom edge line */
.glow-line {
  position: absolute; bottom: 0; left: 5%; right: 5%;
  height: 2px; pointer-events: none; z-index: 2;
  background: linear-gradient(90deg, rgba(160,60,255,0.9) 0%, rgba(200,100,255,0.4) 40%, rgba(200,100,255,0.4) 60%, rgba(230,100,30,0.9) 100%);
  filter: blur(1px);
  border-radius: 2px;
  opacity: 0.8;
}

.status-bar {
  position: relative; z-index: 10; flex-shrink: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 24px 0; color: #fff; font-size: 14px; font-weight: 600;
}
.status-icons { display: flex; gap: 6px; align-items: center; }
.scroll-content {
  flex: 1; overflow-y: auto; position: relative; z-index: 10;
  display: flex; flex-direction: column;
}
.scroll-content::-webkit-scrollbar { display: none; }
.greeting-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 40px 24px; min-height: 400px;
}
.siri-pill {
  background: linear-gradient(135deg, #1a0a2e 0%, #2d1060 40%, #1a0535 70%, #0d0520 100%);
  border: 1.5px solid rgba(180,100,255,0.5); border-radius: 50px;
  padding: 22px 32px; text-align: center; max-width: 240px;
  box-shadow: 0 0 40px rgba(150,60,255,0.35), 0 0 0 1px rgba(180,100,255,0.2);
  animation: pillPulse 3s ease-in-out infinite;
}
@keyframes pillPulse {
  0%,100% { box-shadow: 0 0 30px rgba(150,60,255,0.25), 0 0 0 1px rgba(180,100,255,0.15); }
  50% { box-shadow: 0 0 60px rgba(150,60,255,0.5), 0 0 0 1px rgba(180,100,255,0.3); }
}
.siri-pill p { color: #fff; font-size: 17px; font-weight: 400; line-height: 1.4; }
.chat-area { padding: 20px 20px 16px; display: flex; flex-direction: column; gap: 14px; }
.user-bubble {
  background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px 20px 6px 20px; padding: 13px 16px;
  color: #fff; font-size: 15px; line-height: 1.45;
  align-self: flex-end; max-width: 90%; animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.understood-row {
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  color: #fff; font-size: 15px; user-select: none; animation: fadeUp 0.4s ease both;
}
.chevron-svg { transition: transform 0.3s ease; flex-shrink: 0; }
.chevron-svg.open { transform: rotate(90deg); }
.parsing-block { padding-left: 12px; border-left: 1.5px solid rgba(255,255,255,0.3); animation: fadeUp 0.3s ease; }
.parsing-block p { color: rgba(255,255,255,0.85); font-size: 13px; line-height: 1.85; }
.action-plan { animation: fadeUp 0.4s ease both; }
.action-label { color: #fff; font-size: 15px; margin-bottom: 10px; }
.action-list { color: rgba(255,255,255,0.9); font-size: 14px; line-height: 1.65; padding-left: 18px; }
.action-list li { margin-bottom: 6px; }
.buttons-block { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
.btn-row { display: flex; gap: 10px; }
.btn {
  flex: 1; padding: 15px 0; border-radius: 50px;
  font-size: 16px; font-weight: 600;
  cursor: pointer; font-family: inherit; text-align: center;
  transition: opacity 0.15s, transform 0.1s;
  background: #ffffff; border: none; color: #000000;
}
.btn:active { transform: scale(0.97); opacity: 0.85; }
.btn-cancel { color: #cc0000; }
.btn-approve { width: 100%; }
.typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; animation: fadeUp 0.3s ease; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.55); animation: bounce 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.15s; }
.dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,80%,100% { transform:translateY(0); opacity:0.5; } 40% { transform:translateY(-6px); opacity:1; } }
.result-area { animation: fadeUp 0.5s ease; color: #fff; font-size: 15px; line-height: 1.5; }
.undo-link { color: #5b9cf6; font-size: 13px; text-decoration: underline; cursor: pointer; margin-top: 6px; display: inline-block; }
.new-chat-btn {
  margin: 8px 20px 12px; padding: 12px;
  background: #ffffff; border: none;
  border-radius: 50px; color: #000; font-size: 14px; font-weight: 600;
  cursor: pointer; text-align: center; font-family: inherit;
}
.bottom-bar {
  position: relative; z-index: 10; flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px 20px;
}
.plus-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: #1c1c1c; border: 1.5px solid #444;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; color: #fff; font-size: 20px; font-weight: 300;
}
.ask-bar {
  flex: 1; display: flex; align-items: center;
  background: #1a1a1a; border: 1.5px solid #444;
  border-radius: 50px; padding: 0 16px; height: 38px;
}
.ask-bar input {
  background: transparent; border: none; outline: none;
  color: rgba(255,255,255,0.6); font-size: 15px; font-family: inherit; width: 100%;
}
.ask-bar input::placeholder { color: rgba(255,255,255,0.35); }
.ask-bar input:focus { color: #fff; }
.hidden { display: none !important; }
</style>

<div class="phone">
  <div class="glow-base dim" id="glowBase"></div>
  <div class="glow-line"></div>

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="white" opacity="0.9"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.35"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="white" opacity="0.9"><path d="M7.5 2.5C9.8 2.5 11.9 3.4 13.4 4.9L14.8 3.5C12.9 1.6 10.3 0.5 7.5 0.5C4.7 0.5 2.1 1.6 0.2 3.5L1.6 4.9C3.1 3.4 5.2 2.5 7.5 2.5Z"/><path d="M7.5 5.5C9 5.5 10.4 6.1 11.4 7.1L12.8 5.7C11.4 4.3 9.5 3.5 7.5 3.5C5.5 3.5 3.6 4.3 2.2 5.7L3.6 7.1C4.6 6.1 6 5.5 7.5 5.5Z"/><circle cx="7.5" cy="10.5" r="1.5"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/><rect x="1.5" y="1.5" width="19" height="9" rx="2.5" fill="white"/><path d="M23 4v4a2 2 0 000-4z" fill="white" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="scroll-content" id="scrollContent">
    <div class="greeting-area" id="state0">
      <div class="siri-pill"><p>Hi, how can I help you today?</p></div>
    </div>
    <div class="chat-area hidden" id="chatArea">
      <div class="user-bubble" id="userBubble"></div>
      <div class="typing-indicator hidden" id="typingIndicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <div class="understood-row hidden" id="understoodRow" onclick="toggleParsing()">
        <span>Okay, here's what I understood</span>
        <svg id="chevronSvg" class="chevron-svg" width="8" height="13" viewBox="0 0 8 13" fill="none">
          <path d="M1 1L7 6.5L1 12" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

            <button class="btn btn-edit" onclick="handleEdit()">Edit</button>

  <div class="bottom-bar">

      <input type="text" id="askInput" placeholder="Ask anything"
        onkeydown="if(event.key==='Enter') sendRequest()"
        value="Book a dinner reservation for 4 this Saturday at a nice Italian place near me, and remind my wife">

<script>
let parsingOpen = false;
let currentResult = '';

function extractPartySize(t) {
  const wordNums = { one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10 };
  let m;
  m = t.match(/for\s+(\d+)/); if (m) return m[1];
  m = t.match(/party\s+of\s+(\d+)/); if (m) return m[1];
  m = t.match(/table\s+for\s+(\d+)/); if (m) return m[1];
  m = t.match(/(\d+)\s*(people|persons?|guests?|of us)/); if (m) return m[1];
  m = t.match(/for\s+(one|two|three|four|five|six|seven|eight|nine|ten)/);
  if (m) return String(wordNums[m[1]]);
  if (t.match(/just me|solo|myself|only me/)) return '1';
  if (t.match(/two of us|just us two|both of us/)) return '2';
  return '2';
}
function extractDay(t) {
  if (t.match(/tonight|this evening/)) return 'tonight';
  if (t.match(/tomorrow/)) return 'tomorrow';
  if (t.match(/this saturday|saturday/)) return 'this Saturday';
  if (t.match(/this sunday|sunday/)) return 'this Sunday';
  if (t.match(/this friday|friday/)) return 'this Friday';
  if (t.match(/monday/)) return 'Monday';
  if (t.match(/tuesday/)) return 'Tuesday';
  if (t.match(/wednesday/)) return 'Wednesday';
  if (t.match(/thursday/)) return 'Thursday';
  if (t.match(/next week/)) return 'next week';
  if (t.match(/today/)) return 'today';
  return 'this weekend';
}
function extractContact(t, original) {
  if (t.match(/\bwife\b/)) return 'Sarah';
  if (t.match(/\bhusband\b/)) return 'James';
  if (t.match(/\bmom\b|\bmother\b/)) return 'Mom';
  if (t.match(/\bdad\b|\bfather\b/)) return 'Dad';
  if (t.match(/\bpartner\b/)) return 'Alex';
  if (t.match(/\bfriend\b/)) return 'Jordan';
  const m = original.match(/(?:remind|tell|notify|message|text|call|email)\s+([A-Z][a-z]+)/);
  if (m) return m[1];
  return null;
}
function extractCuisine(t) {
  const cuisines = ['italian','sushi','japanese','mexican','chinese','french','indian','thai','greek','american','korean','mediterranean','vietnamese','spanish'];
  for (const c of cuisines) if (t.includes(c)) return c.charAt(0).toUpperCase() + c.slice(1);
  return null;
}
function restaurantName(cuisine) {
  const map = { Italian:'Cucina Bella', Sushi:'Sakura Garden', Japanese:'Sakura Garden', Mexican:'Casa Verde', French:'Le Petit Bistro', Indian:'Spice Route', Thai:'Bangkok Garden', Greek:'Olive & Fig', Korean:'Seoul Kitchen', Chinese:'Golden Dragon', Mediterranean:'Terra Mare', Vietnamese:'Pho Saigon' };
  return map[cuisine] || 'The Local Table';
}
function extractMessageBody(t, original) {
  let m;
  m = original.match(/(?:say(?:ing)?|that|to say|with)\s+"?(.+)"?$/i);
  if (m) return m[1].replace(/^["']|["']$/g,'').trim();
  m = original.match(/(?:tell|text|message)\s+\w+\s+(?:that\s+)?(.+)/i);
  if (m) return m[1].replace(/^["']|["']$/g,'').trim();
  m = original.match(/(?:saying|message:?)\s+(.+)/i);
  if (m) return m[1].trim();
  return null;
}
function extractArtists(original) {
  const artists = [];
  const m = original.match(/(?:from\s+artists?\s+|by\s+|featuring\s+)(.+)/i);
  if (m) {
    const raw = m[1].replace(/\band\b/gi, ',').split(',');
    raw.forEach(a => { const trimmed = a.trim(); if (trimmed.length > 0) artists.push(trimmed); });
  }
  return artists;
}
function extractPlaylistName(original) {
  const m = original.match(/(?:called|named|playlist\s+(?:called|named)?)\s+"?([^"]+)"?/i);
  if (m) return m[1].trim();
  return null;
}

function parseRequest(text) {
  const t = text.toLowerCase();
  const original = text;

  if (t.match(/create|make|build|generate/) && t.match(/playlist/)) {
    const artists = extractArtists(original);
    const playlistName = extractPlaylistName(original) || (artists.length > 0 ? `${artists[0]} & More` : 'My New Playlist');
    const artistLabel = artists.length > 0 ? artists.join(' and ') : 'selected artists';
    const songCount = t.match(/(\d+)\s*songs?/) ? t.match(/(\d+)\s*songs?/)[1] : '20';
    const parsing = [`Intent: Create a new playlist`,`Playlist name: "${playlistName}"`,`Artists: ${artistLabel}`,`Track count: ${songCount} songs`,`Source: Apple Music top hits`,`Service: Apple Music`].join('\n');
    const actions = [`Look up top tracks for ${artistLabel} on Apple Music`,`Select top ${songCount} songs across both artists`,`Create new playlist "${playlistName}" in your library`,`Add selected tracks and begin playback`];
    return { parsing, actions, result: `Playlist "${playlistName}" created with ${songCount} tracks from ${artistLabel}. Now playing.` };
  }

  if (t.match(/reserv|restaurant|dinner|lunch|brunch|table|eat out|dining/)) {
    const cuisine = extractCuisine(t);
    const party = extractPartySize(t);
    const day = extractDay(t);
    const contact = extractContact(t, original);
    const rest = restaurantName(cuisine);
    const cuisineLabel = cuisine || 'local';
    const parsing = [`Intent: Make a restaurant reservation${contact ? ' and send a notification' : ''}`,`Party size: ${party}`,`Date: ${day.charAt(0).toUpperCase() + day.slice(1)}`,`Cuisine: ${cuisineLabel}`,`Location: Near current location`,contact ? `Secondary action: Notify contact "${contact}"` : null].filter(Boolean).join('\n');
    const actions = [`Search ${cuisineLabel} restaurants nearby with availability ${day}`,`Book for ${party} at ${rest} (4.7 stars) - 7:30pm`,contact ? `Send message to ${contact}: "Dinner reservation ${day} at 7:30pm at ${rest}"` : null].filter(Boolean);
    return { parsing, actions, result: `Reservation confirmed at ${rest}, ${day} at 7:30pm for ${party}.${contact ? ` ${contact} has been notified.` : ''}` };
  }

  if (t.match(/schedul|meeting|calendar|appointment|event|zoom|catch up/)) {
    const timeM = original.match(/(\d{1,2}(:\d{2})?\s*(am|pm))/i);
    const time = timeM ? timeM[0] : '10:00am';
    const day = extractDay(t);
    const withM = original.match(/with\s+([A-Z][a-z]+)/);
    const withWho = withM ? withM[1] : null;
    const aboutM = original.match(/about\s+(.+)/i);
    const topic = aboutM ? aboutM[1].split(' ').slice(0,5).join(' ') : 'upcoming project';
    const parsing = [`Intent: Schedule a calendar event`,`Date: ${day.charAt(0).toUpperCase() + day.slice(1)}`,`Time: ${time}`,withWho ? `Attendee: ${withWho}` : null,`Topic: ${topic}`,`Action: Add to calendar${withWho ? ' + send invite' : ''}`].filter(Boolean).join('\n');
    const actions = [`Check your calendar for conflicts on ${day} at ${time}`,`Create event: "${topic}" on ${day} at ${time}`,withWho ? `Send calendar invite to ${withWho}` : 'Set a 10-minute reminder'];
    return { parsing, actions, result: `"${topic}" added to your calendar for ${day} at ${time}.${withWho ? ` Invite sent to ${withWho}.` : ''}` };
  }

  if (t.match(/remind me|set a reminder|alarm|wake me/)) {
    const timeM = original.match(/(\d{1,2}(:\d{2})?\s*(am|pm))/i);
    const time = timeM ? timeM[0] : '8:00am';
    const day = extractDay(t);
    const aboutM = original.match(/(?:to|about)\s+(.+)/i);
    const about = aboutM ? aboutM[1].split(' ').slice(0,6).join(' ') : 'your task';
    const parsing = [`Intent: Set a reminder`,`Time: ${time}`,`Date: ${day.charAt(0).toUpperCase() + day.slice(1)}`,`Reminder: ${about}`,`Notification: Banner + sound`].join('\n');
    const actions = [`Create reminder: "${about}"`,`Schedule for ${day} at ${time}`,`Enable notification with sound`];
    return { parsing, actions, result: `Reminder set for ${day} at ${time}: "${about}".` };
  }

  if (t.match(/\btext\b|\bmessage\b|\bsend\b|\btell\b|\bcall\b|\bemail\b/)) {
    const contact = extractContact(t, original) || 'your contact';
    const isCall = t.match(/\bcall\b/);
    const isEmail = t.match(/\bemail\b/);
    const msgBody = extractMessageBody(t, original);
    const method = isCall ? 'Phone call' : isEmail ? 'Email' : 'iMessage';
    const parsing = [`Intent: ${isCall ? 'Place a phone call' : isEmail ? 'Send an email' : 'Send a message'}`,`Recipient: ${contact}`,`Method: ${method}`,msgBody ? `Message: "${msgBody}"` : null,`Priority: Normal`].filter(Boolean).join('\n');
    const actions = isCall ? [`Look up ${contact} in Contacts`,`Initiate call to ${contact}`,`Connect audio`] : [`Look up ${contact} in Contacts`,msgBody ? `Compose message: "${msgBody}"` : `Compose message`,`Send via ${isEmail ? 'Mail' : 'iMessage'} to ${contact}`];
    return { parsing, actions, result: isCall ? `Calling ${contact} now.` : `Message sent to ${contact}${msgBody ? `: "${msgBody}"` : ''}.` };
  }

  if (t.match(/navigate|directions|drive|take me|route|get to|way to/)) {
    const destM = original.match(/to\s+(.+)/i);
    const dest = destM ? destM[1].split(' ').slice(0,5).join(' ') : 'your destination';
    const mode = t.match(/walk/) ? 'Walking' : t.match(/transit|bus|train/) ? 'Transit' : 'Driving';
    const parsing = [`Intent: Get directions`,`Destination: ${dest}`,`Mode: ${mode}`,`Departure: Now`,`Traffic: Live`].join('\n');
    const actions = [`Find fastest ${mode.toLowerCase()} route to ${dest}`,`Check real-time traffic conditions`,`Open Maps with turn-by-turn navigation`];
    return { parsing, actions, result: `${mode} directions to ${dest} opened in Maps. Estimated arrival: 18 min.` };
  }

  if (t.match(/play|music|song|artist|playlist|album|podcast/)) {
    const whatM = original.match(/play\s+(.+)/i);
    const what = whatM ? whatM[1].split(' ').slice(0,6).join(' ') : 'your library';
    const parsing = [`Intent: Play media`,`Query: "${what}"`,`Service: Apple Music`,`Output: Current audio device`,`Shuffle: Off`].join('\n');
    const actions = [`Search Apple Music for "${what}"`,`Match to closest result in your library`,`Begin playback`];
    return { parsing, actions, result: `Now playing "${what}" on Apple Music.` };
  }

  if (t.match(/lights?|thermostat|temperature|lock|unlock|door|heat|cool|fan/)) {
    const action = t.match(/turn on|switch on/) ? 'Turn on' : t.match(/turn off|switch off/) ? 'Turn off' : t.match(/\block\b/) ? 'Lock' : t.match(/unlock/) ? 'Unlock' : t.match(/dim/) ? 'Dim' : 'Adjust';
    const device = t.match(/lights?/) ? 'lights' : t.match(/thermostat|heat|cool|temperature/) ? 'thermostat' : t.match(/lock|door/) ? 'front door lock' : 'device';
    const roomM = t.match(/bedroom|living room|kitchen|bathroom|office|garage/);
    const room = roomM ? roomM[0] : 'home';
    const parsing = [`Intent: Smart home control`,`Action: ${action}`,`Device: ${room} ${device}`,`Timing: Immediately`,`Confirmation: Required`].join('\n');
    const actions = [`Connect to HomeKit`,`Locate ${room} ${device}`,`${action} ${room} ${device}`];
    return { parsing, actions, result: `${room.charAt(0).toUpperCase() + room.slice(1)} ${device} ${action.toLowerCase()}ed.` };
  }

  if (t.match(/what|who|when|where|how|search|find|look up|tell me|show me/)) {
    const query = original.replace(/^(what('?s)?|who('?s)?|when|where|how|search for|find|look up|tell me about|show me)\s*/i, '').trim() || original;
    const parsing = [`Intent: Information lookup`,`Query: "${query}"`,`Sources: Apple Intelligence + Web`,`Personalization: On`].join('\n');
    const actions = [`Search Apple Intelligence for "${query}"`,`Cross-reference web results`,`Compose personalized summary`];
    return { parsing, actions, result: `Here's what I found about "${query}". Results ready to view.` };
  }

  return {
    parsing: [`Intent: General request`,`Query: "${original.slice(0,50)}${original.length>50?'...':''}"`,`Context: Current device state`,`Action: Process via Apple Intelligence`].join('\n'),
    actions: ['Analyze request using Apple Intelligence','Identify best app or service','Execute and confirm'],
    result: 'Done. Your request has been completed.'
  };
}

function sendRequest() {
  const input = document.getElementById('askInput');
  const text = input.value.trim();
  if (!text) return;
  const parsed = parseRequest(text);
  currentResult = parsed.result;
  document.getElementById('state0').classList.add('hidden');
  document.getElementById('chatArea').classList.remove('hidden');
  document.getElementById('userBubble').textContent = text;
  document.getElementById('glowBase').className = 'glow-base bright';
  document.getElementById('parsingText').innerHTML = parsed.parsing.replace(/\n/g, '<br>');
  document.getElementById('actionList').innerHTML = parsed.actions.map(a => `<li>${a}</li>`).join('');
  ['understoodRow','parsingBlock','actionPlan','resultArea','newChatBtn'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById('typingIndicator').classList.add('hidden');
  document.getElementById('chevronSvg').classList.remove('open');
  parsingOpen = false;
  input.value = '';
  setTimeout(() => { document.getElementById('typingIndicator').classList.remove('hidden'); scrollBottom(); }, 300);
  setTimeout(() => { document.getElementById('typingIndicator').classList.add('hidden'); document.getElementById('understoodRow').classList.remove('hidden'); scrollBottom(); }, 1800);
  setTimeout(() => { document.getElementById('actionPlan').classList.remove('hidden'); scrollBottom(); }, 2500);
}
function scrollBottom() {
  const sc = document.getElementById('scrollContent');
  setTimeout(() => { sc.scrollTop = sc.scrollHeight; }, 60);
}
function toggleParsing() {
  parsingOpen = !parsingOpen;
  document.getElementById('parsingBlock').classList.toggle('hidden', !parsingOpen);
  document.getElementById('chevronSvg').classList.toggle('open', parsingOpen);
  scrollBottom();
}
function handleApprove() {
  document.getElementById('actionPlan').classList.add('hidden');
  document.getElementById('typingIndicator').classList.remove('hidden');
  scrollBottom();
  setTimeout(() => {
    document.getElementById('typingIndicator').classList.add('hidden');
    const r = document.getElementById('resultArea');
    r.classList.remove('hidden');
    r.innerHTML = `<p>${currentResult}</p><span class="undo-link" onclick="handleUndo()">Undo</span>`;
    document.getElementById('newChatBtn').classList.remove('hidden');
    scrollBottom();
  }, 1200);
}
function handleEdit() {
  document.getElementById('askInput').value = document.getElementById('userBubble').textContent;
  document.getElementById('askInput').focus();
}
function handleCancel() {
  document.getElementById('actionPlan').classList.add('hidden');
  const r = document.getElementById('resultArea');
  r.classList.remove('hidden');
  r.innerHTML = '<p style="color:rgba(255,255,255,0.55)">Request cancelled. Nothing was changed.</p>';
  document.getElementById('newChatBtn').classList.remove('hidden');
  scrollBottom();
}
function handleUndo() {
  document.getElementById('resultArea').innerHTML = '<p style="color:rgba(255,255,255,0.55)">Action reversed. Everything restored.</p>';
}
function resetAll() {
  ['chatArea','newChatBtn','understoodRow','parsingBlock','actionPlan','resultArea','typingIndicator'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById('state0').classList.remove('hidden');
  document.getElementById('glowBase').className = 'glow-base dim';
  document.getElementById('askInput').value = '';
  document.getElementById('askInput').placeholder = 'Ask anything';
  document.getElementById('chevronSvg').classList.remove('open');
  parsingOpen = false;
  document.getElementById('scrollContent').scrollTop = 0;
}
</script>
